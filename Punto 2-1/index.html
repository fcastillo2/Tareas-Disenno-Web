<!DOCTYPE html>
<html>
<head>
    <title>Modelo de Caja (Box Model)</title>
    <link rel="stylesheet" href="estilos.css">
    <meta charset="UTF-8">
</head>
<body>

<h1>Box Model</h1>

<div class="caja">
    Esta es una caja utilizando relleno, borde y margen.
</div>

<h1>Elementos en línea</h2>

<span class="inline">Elemento 1</span>
<span class="inline">Elemento 2</span>

<h1>Elementos Block</h2>

<div class="block">Bloque 1</div>
<div class="block">Bloque 2</div>

<h1>Propiedad display</h2>

<div class="display-inline">
    Este div se comporta como inline
</div>

</body>
</html>
